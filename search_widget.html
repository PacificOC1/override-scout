<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Override Scout DB</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f0f0d;--ink2:#4a4a46;--ink3:#9a9a94;
  --paper:#fafaf7;--paper2:#f0f0eb;--paper3:#e4e4de;
  --red:#c8410a;--blue:#1a5fb4;
  --green:#2d6a2d;--green-bg:#e8f5e8;
  --amber-bg:#fef3cd;--amber:#7a5c00;
  --mono:'DM Mono','Courier New',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --radius:6px;--radius-lg:10px;
}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;font-size:14px}
.wrap{max-width:900px;margin:0 auto;padding:1.25rem 1rem 3rem}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:2px solid var(--ink);flex-wrap:wrap;gap:8px}
.hd-title{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.hd-title span{color:var(--red)}
.hd-sub{font-size:11px;color:var(--ink3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px;margin-top:3px}
.status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3);font-family:var(--mono)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ink3);flex-shrink:0}
.dot.live{background:var(--green)}.dot.err{background:var(--red)}
.search-row{display:flex;gap:0;margin-bottom:1rem;border:1.5px solid var(--ink);border-radius:var(--radius);overflow:hidden}
.search-row:focus-within{box-shadow:3px 3px 0 var(--ink)}
.si{flex:1;border:none;outline:none;padding:10px 14px;font-size:14px;font-family:var(--mono);background:transparent;color:var(--ink);min-width:0}
.si::placeholder{color:var(--ink3)}
.sb{padding:10px 18px;background:var(--ink);color:var(--paper);border:none;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;font-family:var(--sans)}
.sb:hover{background:var(--red)}
.filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.fl{font-size:11px;font-family:var(--mono);color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.chip{padding:4px 12px;border:1px solid var(--paper3);border-radius:99px;font-size:12px;cursor:pointer;background:var(--paper2);color:var(--ink2);font-family:var(--mono)}
.chip.on,.chip:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
@media(max-width:500px){.cards{grid-template-columns:1fr 1fr}}
.mc{background:var(--paper2);border:1px solid var(--paper3);border-radius:var(--radius);padding:.6rem .85rem}
.mc-l{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);margin-bottom:3px}
.mc-v{font-size:20px;font-weight:600;font-family:var(--mono)}
.tcard{border:1.5px solid var(--ink);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1rem}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--ink);color:var(--paper);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.6px;padding:8px 10px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:#2a2a26}th.sorted{color:#ffd700}
td{padding:9px 10px;border-bottom:.5px solid var(--paper3);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--paper2);cursor:pointer}
.tn{font-family:var(--mono);font-weight:600;font-size:14px;color:var(--blue)}
.rk{font-family:var(--mono);font-size:11px;color:var(--ink3);width:24px}
.badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-family:var(--mono);font-weight:500}
.b-awp{background:var(--green-bg);color:var(--green);border:1px solid #b8ddb8}
.b-sig{background:var(--amber-bg);color:var(--amber);border:1px solid #f0d070}
.b-no{background:var(--paper2);color:var(--ink3);border:1px solid var(--paper3)}
.awp-wrap{display:flex;height:5px;border-radius:3px;background:var(--paper3);overflow:hidden;flex:1;min-width:40px}
.awp-fill{background:var(--green);border-radius:3px}
.overlay{display:none;position:fixed;inset:0;background:rgba(15,15,13,.5);z-index:200;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.dcard{background:var(--paper);border:1.5px solid var(--ink);border-radius:var(--radius-lg);padding:1.5rem;max-width:600px;width:100%;max-height:88vh;overflow-y:auto;position:relative;box-shadow:5px 5px 0 var(--ink)}
.dc-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink2);line-height:1}
.dc-close:hover{color:var(--red)}
.dc-team{font-size:26px;font-weight:700;letter-spacing:-1px;font-family:var(--mono);color:var(--blue);margin-bottom:2px}
.dc-sub{font-size:12px;color:var(--ink3);font-family:var(--mono);margin-bottom:1.25rem}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
@media(max-width:440px){.sgrid{grid-template-columns:1fr 1fr}}
.sbox{background:var(--paper2);border:1px solid var(--paper3);border-radius:var(--radius);padding:8px 10px}
.sbox-l{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);margin-bottom:4px}
.sbox-v{font-size:18px;font-weight:600;font-family:var(--mono)}
.dr{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:.5px solid var(--paper3);font-size:13px;gap:12px}
.dr:last-child{border-bottom:none}
.dk{font-family:var(--mono);font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.dv{font-size:13px;text-align:right;color:var(--ink);word-break:break-all}
.mh-hd{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);margin:1rem 0 6px}
.mh-row{display:grid;grid-template-columns:1fr 70px 60px 36px 28px;gap:6px;padding:6px 0;border-bottom:.5px solid var(--paper3);font-size:12px;align-items:center}
.mh-row:last-child{border-bottom:none}
.pager{display:flex;gap:6px;justify-content:center;align-items:center;margin-top:.75rem;font-size:12px;font-family:var(--mono)}
.pb{padding:4px 12px;border:1px solid var(--paper3);border-radius:var(--radius);background:var(--paper2);cursor:pointer;color:var(--ink2);font-family:var(--mono);font-size:12px}
.pb:hover:not(:disabled){background:var(--ink);color:var(--paper);border-color:var(--ink)}
.pb:disabled{opacity:.35;cursor:default}
.pi{color:var(--ink3);padding:0 8px}
.state{text-align:center;padding:3rem 1rem;color:var(--ink3);font-family:var(--mono);font-size:13px;line-height:2}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--paper3);border-top-color:var(--ink);border-radius:50%;animation:sp .7s linear infinite;margin-bottom:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.err-box{background:#fff0ed;border:1px solid #f8c5b5;border-radius:var(--radius);padding:1rem;font-size:13px;color:#7a2a10;margin-bottom:1rem;line-height:1.7;display:none}
</style>
</head>
<body>
<div class="wrap">

  <div class="hd">
    <div>
      <div class="hd-title">Override <span>Scout</span> DB</div>
      <div class="hd-sub">V5RC 2026–27 · Autonomous statistics · Read only</div>
    </div>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="stxt">Connecting…</span>
    </div>
  </div>

  <div id="errBox" class="err-box"></div>

  <div class="search-row">
    <input class="si" id="si" type="text" placeholder="Search team number (e.g. 73017D)…"
      onkeydown="if(event.key==='Enter')doSearch()">
    <button class="sb" onclick="doSearch()">Search</button>
  </div>

  <div class="filters">
    <span class="fl">Browse:</span>
    <span class="chip on" onclick="setFilter('all',this)">All teams</span>
    <span class="chip"    onclick="setFilter('sig',this)">Sig events</span>
    <span class="chip"    onclick="setFilter('awp',this)">AWP achieved</span>
    <span class="chip"    onclick="setFilter('top',this)">Top pins</span>
  </div>

  <div class="cards" id="cards" style="display:none">
    <div class="mc"><div class="mc-l">Teams</div><div class="mc-v" id="cT">—</div></div>
    <div class="mc"><div class="mc-l">Entries</div><div class="mc-v" id="cE">—</div></div>
    <div class="mc"><div class="mc-l">Avg pins</div><div class="mc-v" id="cP">—</div></div>
    <div class="mc"><div class="mc-l">AWP rate</div><div class="mc-v" id="cA">—</div></div>
  </div>

  <div id="main"><div class="state"><div class="spin"></div><br>Loading…</div></div>

  <div class="pager" id="pager" style="display:none">
    <button class="pb" id="prev" onclick="goPage(-1)" disabled>← Prev</button>
    <span class="pi" id="pi"></span>
    <button class="pb" id="next" onclick="goPage(1)">Next →</button>
  </div>

</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
  <div class="dcard">
    <button class="dc-close" onclick="closeDetail()">✕</button>
    <div id="dc"></div>
  </div>
</div>

<script>
const SB_URL = 'https://ajymmthxmdyhkiynwhuf.supabase.co';
const SB_KEY = 'sb_publishable_1r5xHNrNLbRHB_GcJMgsjg_fwEvgdqS';
const HDRS   = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Accept': 'application/json' };

const PG = 20;
let allEntries=[], allTeams=[], filtered=[];
let pg=1, sortC='avg_pins', sortD=-1, activeF='all';

function pins(e){ return (e.pins||'0').split('+').map(n=>parseInt(n)||0).reduce((a,b)=>a+b,0); }

/* ── Fetch all entries (handles pagination) ── */
async function loadAll() {
  let rows=[], off=0, batch;
  do {
    const r = await fetch(SB_URL+'/rest/v1/entries?select=*&order=created_at.desc&limit=1000&offset='+off, {headers:HDRS});
    if(!r.ok){ const t=await r.text(); throw new Error('HTTP '+r.status+': '+t.slice(0,200)); }
    batch = await r.json();
    rows  = rows.concat(batch);
    off  += 1000;
  } while(batch.length===1000);
  return rows;
}

/* ── Build per-team stats ── */
function buildStats(entries) {
  const m={};
  entries.forEach(e=>{
    const k=(e.team||'').toUpperCase().trim(); if(!k) return;
    if(!m[k]) m[k]={team:k,rows:[],routes:new Set(),types:new Set(),last:''};
    m[k].rows.push(e);
    if(e.route&&e.route!=='Unknown route') m[k].routes.add(e.route);
    if(e.type) m[k].types.add(e.type);
    if((e.created_at||'')>m[k].last) m[k].last=e.created_at||'';
  });
  return Object.values(m).map(g=>{
    const rows=g.rows, n=rows.length;
    const totPins=rows.reduce((s,e)=>s+pins(e),0);
    const totBon =rows.reduce((s,e)=>s+(parseInt(e.bonuses)||0),0);
    const awpN   =rows.filter(e=>e.awp==='Y').length;
    const sigN   =rows.filter(e=>e.sig==='yes').length;
    return {
      team:g.team, count:n,
      avg_pins:   n?(totPins/n).toFixed(2):0,
      avg_bonuses:n?(totBon/n).toFixed(2):0,
      awp_pct:    n?(awpN/n*100).toFixed(1):0,
      awp_count:awpN, sig_count:sigN,
      routes:[...g.routes].join(' · ')||'—',
      types:[...g.types].join(', ')||'—',
      last:g.last, matches:rows
    };
  });
}

/* ── Init ── */
async function init() {
  try {
    allEntries = await loadAll();
    allTeams   = buildStats(allEntries);
    const totP = allEntries.reduce((s,e)=>s+pins(e),0);
    const avgP = allEntries.length?(totP/allEntries.length).toFixed(1):'—';
    const awpR = allEntries.length?Math.round(allEntries.filter(e=>e.awp==='Y').length/allEntries.length*100):0;
    document.getElementById('cT').textContent = allTeams.length;
    document.getElementById('cE').textContent = allEntries.length;
    document.getElementById('cP').textContent = avgP;
    document.getElementById('cA').textContent = awpR+'%';
    document.getElementById('cards').style.display='grid';
    setStatus('live', allTeams.length+' teams · '+allEntries.length+' entries');
    applyFilter(activeF);
  } catch(err) {
    setStatus('err','Failed to load');
    const eb=document.getElementById('errBox');
    eb.style.display='block';
    eb.innerHTML='<strong>Database error:</strong> '+err.message+'<br><br>Check: Supabase URL/key correct · RLS SELECT policy exists · entries table exists';
    document.getElementById('main').innerHTML='';
    console.error(err);
  }
}

function setStatus(s,t){
  document.getElementById('dot').className='dot '+s;
  document.getElementById('stxt').textContent=t;
}

/* ── Filter ── */
function setFilter(f,el){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on'); activeF=f; pg=1; applyFilter(f);
}
function applyFilter(f){
  if(f==='all') filtered=[...allTeams];
  else if(f==='sig') filtered=allTeams.filter(t=>t.sig_count>0);
  else if(f==='awp') filtered=allTeams.filter(t=>t.awp_count>0);
  else if(f==='top') filtered=[...allTeams].sort((a,b)=>b.avg_pins-a.avg_pins);
  sortRender();
}

/* ── Sort ── */
function sortBy(col){
  if(sortC===col) sortD*=-1; else{sortC=col;sortD=-1;}
  document.querySelectorAll('th.sorted').forEach(e=>e.classList.remove('sorted'));
  document.getElementById('th-'+col)?.classList.add('sorted');
  sortRender();
}
function sortRender(){
  filtered.sort((a,b)=>(parseFloat(a[sortC])||0)-(parseFloat(b[sortC])||0)).sort((a,b)=>{
    const d=(parseFloat(b[sortC])||0)-(parseFloat(a[sortC])||0); return d*sortD||a.team.localeCompare(b.team);
  });
  render();
}

/* ── Render table ── */
function render(){
  const start=(pg-1)*PG, sl=filtered.slice(start,start+PG), tot=filtered.length, pages=Math.ceil(tot/PG);
  if(!sl.length){showEmpty('No teams match this filter.');return;}
  document.getElementById('main').innerHTML=`
    <div class="tcard"><div class="tw"><table>
      <thead><tr>
        <th class="rk">#</th>
        <th onclick="sortBy('team')" id="th-team">Team</th>
        <th onclick="sortBy('count')" id="th-count">Matches</th>
        <th onclick="sortBy('avg_pins')" id="th-avg_pins" class="sorted">Avg Pins ↕</th>
        <th onclick="sortBy('avg_bonuses')" id="th-avg_bonuses">Avg Bonus</th>
        <th onclick="sortBy('awp_pct')" id="th-awp_pct">AWP Rate</th>
        <th onclick="sortBy('sig_count')" id="th-sig_count">Sig</th>
        <th>Robot Type</th>
      </tr></thead><tbody>
      ${sl.map((t,i)=>`<tr onclick='openDetail(${JSON.stringify(JSON.stringify(t))})'>
        <td class="rk">${start+i+1}</td>
        <td><span class="tn">${t.team}</span></td>
        <td style="font-family:var(--mono)">${t.count}</td>
        <td style="font-family:var(--mono);font-weight:600">${parseFloat(t.avg_pins).toFixed(1)}</td>
        <td style="font-family:var(--mono)">${parseFloat(t.avg_bonuses).toFixed(1)}</td>
        <td><div style="display:flex;align-items:center;gap:6px">
          <span style="font-family:var(--mono);min-width:34px">${parseFloat(t.awp_pct).toFixed(0)}%</span>
          <div class="awp-wrap"><div class="awp-fill" style="width:${Math.min(parseFloat(t.awp_pct),100)}%"></div></div>
        </div></td>
        <td>${t.sig_count>0?'<span class="badge b-sig">'+t.sig_count+'</span>':'<span class="badge b-no">—</span>'}</td>
        <td style="font-size:12px;color:var(--ink2)">${t.types}</td>
      </tr>`).join('')}
      </tbody></table></div></div>`;
  const pager=document.getElementById('pager');
  if(pages>1){
    pager.style.display='flex';
    document.getElementById('pi').textContent=`Page ${pg} of ${pages} (${tot} teams)`;
    document.getElementById('prev').disabled=pg===1;
    document.getElementById('next').disabled=pg===pages;
  } else pager.style.display='none';
}

function goPage(d){pg+=d;render();window.scrollTo(0,0);}
function showEmpty(msg){document.getElementById('main').innerHTML=`<div class="state">🔍<br>${msg}</div>`;document.getElementById('pager').style.display='none';}

/* ── Search ── */
function doSearch(){
  const q=document.getElementById('si').value.trim().toUpperCase();
  if(!q){applyFilter(activeF);return;}
  const res=allTeams.filter(t=>t.team.includes(q));
  if(!res.length){showEmpty('No data for "'+q+'" — check team number.');return;}
  if(res.length===1){openDetail(JSON.stringify(res[0]));return;}
  filtered=res;pg=1;sortRender();
}

/* ── Detail ── */
function openDetail(jsonStr){
  const t=JSON.parse(jsonStr);
  const awpPct=parseFloat(t.awp_pct||0);
  const routes=(t.routes||'—').split(' · ').map(r=>`<code style="font-family:var(--mono);font-size:11px;background:var(--paper2);padding:1px 5px;border-radius:3px">${r}</code>`).join(' ');
  document.getElementById('dc').innerHTML=`
    <div class="dc-team">${t.team}</div>
    <div class="dc-sub">${t.types} · ${t.count} match${t.count!==1?'es':''} scouted</div>
    <div class="sgrid">
      <div class="sbox"><div class="sbox-l">Matches</div><div class="sbox-v">${t.count}</div></div>
      <div class="sbox"><div class="sbox-l">Avg Pins</div><div class="sbox-v">${parseFloat(t.avg_pins).toFixed(1)}</div></div>
      <div class="sbox"><div class="sbox-l">AWP Rate</div><div class="sbox-v">${awpPct.toFixed(0)}%</div></div>
      <div class="sbox"><div class="sbox-l">Sig Matches</div><div class="sbox-v">${t.sig_count}</div></div>
    </div>
    <div class="dr"><span class="dk">AWP achieved</span><span class="dv">${t.awp_count} / ${t.count}</span></div>
    <div class="dr"><span class="dk">Avg bonuses</span><span class="dv">${parseFloat(t.avg_bonuses).toFixed(1)}</span></div>
    <div class="dr"><span class="dk">Known routes</span><span class="dv">${routes}</span></div>
    <div class="dr"><span class="dk">Robot types</span><span class="dv">${t.types}</span></div>
    <div class="dr"><span class="dk">Last scouted</span><span class="dv">${t.last?new Date(t.last).toLocaleDateString():'—'}</span></div>
    ${t.matches&&t.matches.length?`
    <div class="mh-hd">Match history (${t.matches.length})</div>
    ${t.matches.slice(0,20).map(e=>`
      <div class="mh-row">
        <span style="font-size:11px;color:var(--ink2)">${e.event||'—'}</span>
        <span style="font-family:var(--mono);font-size:11px">${e.round||'—'}</span>
        <span style="font-family:var(--mono);font-size:12px">${e.pins||'0'} pins</span>
        <span><span class="badge ${e.awp==='Y'?'b-awp':'b-no'}">${e.awp||'N'}</span></span>
        <span style="font-family:var(--mono);font-size:11px;color:var(--ink3)">${e.side||''}</span>
      </div>`).join('')}
    ${t.matches.length>20?`<div style="font-size:11px;color:var(--ink3);padding-top:6px;font-family:var(--mono)">+${t.matches.length-20} more matches</div>`:''}
    `:''}`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDetail(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});

init();
</script>
</body>
</html>
